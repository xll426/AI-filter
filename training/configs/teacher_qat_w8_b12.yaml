experiment_name: teacher_qat_w8_b12
output_root: ./runs

data:
  root: /mnt/d/fudan/prefilter_clean/data/xlx_clean_roi_512

model:
  in_channels: 3
  out_channels: 3
  downscale_factor: 4
  rep_scale: 4
  only_train_y: true
  pretrain_path: ./weights/iccv_yan_2025_fp32.pth
  strict_load: true

int_qat:
  weight_bits: 8
  bias_bits: 12
  per_channel_shift: true
  min_shift: 0
  max_shift: 30
  export_best: true
  export_latest: true
  teacher_target:
    loss_type: l1
    loss_weight: 1.0
    only_y: true

train:
  seed: 123
  device: cuda
  batch_size: 16
  val_batch_size: 8
  num_workers: 0
  crop_size: 224
  hflip: true
  lr: 1.0e-5
  min_lr: 1.0e-6
  weight_decay: 1.0e-6
  total_iter: 5000
  warmup_iter: 200
  mixed_precision: false
  resume: none
  scheduler:
    T_max: 5000
    eta_min: 1.0e-6

logger:
  print_freq: 100
  val_freq: 1000
  save_latest_freq: 500
  save_checkpoint_freq: 1000

validation:
  primary_metric: psnr
  primary_higher_is_better: true
